session: 2
title: "基本ワークフロー：変更をGitHubに届けるまで"
audience: "初心者エンジニア（SPO / PowerApps 経験者）"
goal: "ファイルを変更してGitHubに反映するまでの一連の流れを体験する"

slides:

  - id: 1
    heading: "今日やること"
    content: |
      Gitの基本はこの一連の流れを覚えるだけ

        ファイルを変更
            ↓
        git add（ステージング）   変更をコミット対象に選ぶ
            ↓
        git commit               ローカルに記録する
            ↓
        git push                 GitHubに送る

      逆方向（GitHubから取得）：
        git pull                 GitHubの変更をローカルに取り込む

      【今日使うコマンド】
        git status / git add / git commit / git push / git pull / git log

  - id: 2
    heading: "リポジトリを用意する"
    content: |
      【パターンA：GitHubから持ってくる（clone）】
        ① GitHubでリポジトリを開く
        ② 「Code」→ HTTPSのURLをコピー
        ③ ターミナルで実行：
            $ git clone https://github.com/yourname/my-project.git

        VSCode：コマンドパレット（Ctrl + Shift + P）→「Git: Clone」

      【パターンB：ローカルで作ってGitHubに繋げる】
        ① フォルダをVSCodeで開き $ git init
        ② GitHubで新規リポジトリを作成（READMEのチェックは外す）
        ③ ターミナルで実行：
            $ git remote add origin https://github.com/yourname/my-project.git
            $ git push -u origin main

  - id: 3
    heading: "git status：まず状態を確認する"
    content: |
      何かする前後に必ず確認する習慣をつける

        $ git status

      表示される状態：
        Untracked         まだGitに登録されていないファイル
        Modified          変更されたがステージングされていない
        Staged            ステージング済み（コミット待ち）
        nothing to commit クリーンな状態

      VSCode：ソース管理パネル（Ctrl + Shift + G）に自動で一覧表示
        アイコンの意味：U（Untracked）/ M（Modified）/ D（Deleted）

  - id: 4
    heading: "git add：ステージングする"
    content: |
      「このファイルをコミットに含める」と選ぶ操作

        $ git add ファイル名        特定のファイルだけ
        $ git add .               カレントフォルダの全変更

      ⚠️ git add . は便利だが不要なファイルも含めてしまうことがある
         → .gitignore で除外ファイルを指定しておく（次スライド）

      VSCode：ソース管理パネルでファイルの「+」アイコンをクリック

  - id: 5
    heading: ".gitignore：含めないファイルを指定する"
    content: |
      プロジェクトルートに .gitignore ファイルを作成する

        # 例
        .env           ← APIキーや接続情報。絶対にコミットしない
        __pycache__/
        node_modules/
        .vscode/

      ⚠️ .env のコミットは情報漏洩に直結する
         プロジェクト開始時に必ず作成する

      GitHubでリポジトリ作成時に言語を選ぶと自動生成してくれる

  - id: 6
    heading: "git commit：ローカルに記録する"
    content: |
      ステージングした変更をスナップショットとして保存する

        $ git commit -m "コミットメッセージ"

      良いコミットメッセージ：
        ❌「修正」「更新」（何をしたか分からない）
        ✅「ログイン画面のバリデーションエラー文言を修正」
        ✅「ヘッダーにレスポンシブ対応を追加」

      AI駆動開発のコツ：
        AIが大量にコードを生成したら意味のある単位でコミットする
        「AIで生成」「動作確認・修正」を別コミットにすると履歴が追いやすい

      VSCode：ソース管理パネルのテキストボックスにメッセージを入力 → チェックマーク

  - id: 7
    heading: "git push：GitHubに送る"
    content: |
      コミット済みの変更をGitHubに反映する

        $ git push

      初回のみ -u オプションが必要：
        $ git push -u origin main
        → ローカルとリモートのブランチを紐づける設定
        → 2回目以降は git push だけでOK

      【初回認証（PAT入力）】
        Username：GitHubのユーザー名
        Password：PAT（Personal Access Token）※パスワードではない
        → 一度入力するとWindowsの資格情報マネージャーに保存される

      VSCode：ソース管理パネル →「…」→「プッシュ」、または画面下の↑アイコン

  - id: 8
    heading: "git pull：GitHubから取り込む"
    content: |
      他の人の変更やGitHub上の変更をローカルに反映する

        $ git pull

      作業開始前に必ず git pull する習慣をつける
      → 常に最新の状態で作業できる

      ⚠️ よくあるエラー：pushが拒否される（rejected）
         原因：リモートにローカルにない変更がある
         対処：先に git pull → 再度 git push

      VSCode：ソース管理パネル →「…」→「プル」、または画面下の↓アイコン

  - id: 9
    heading: "git log：履歴を確認する"
    content: |
      コミット履歴を確認する

        $ git log --oneline
        a3f9c12 ログイン画面のバリデーション修正
        e72b841 ヘッダーにレスポンシブ対応を追加
        ...

      --oneline で1行表示、見やすくなる

      VSCode：GitLens の「COMMITS」パネルで視覚的に確認できる

  - id: 10
    heading: "Session 2 まとめ"
    content: |
      【基本ワークフロー】
        git pull     → 最新を取得（作業前）
        （ファイルを変更）
        git status   → 状態確認
        git add      → ステージング
        git commit   → ローカルに記録
        git push     → GitHubに送信

      ✅ この流れを体で覚えることがGitの第一歩
      ✅ .gitignore で .env などを除外する習慣を

      次回：ブランチを使って、メインのコードを壊さずに変更を試す
