session: 1
title: "Gitとは？ 導入・インストール・初期設定"
audience: "初心者エンジニア（SPO / PowerApps 経験者）"
goal: "Gitの概念を理解し、Windows環境でセットアップを完了させる"

slides:

  - id: 1
    heading: "なぜGitが必要か"
    content: |
      これまで：SharePointやPowerAppsでファイルのバージョン管理
      　→ 変更履歴はあるが「誰が・何を・なぜ変えたか」が追いにくい

      AI駆動開発では：
        - AIが大量のコードを生成・書き換えする
        - 「動いていたのに壊れた」が頻発する
        - 元に戻したい・試した変更を捨てたい場面が増える

      Gitがあると：
        ✅ 任意の時点に戻れる
        ✅ 変更の意図をメッセージで残せる
        ✅ 実験的な変更を安全に試せる

  - id: 2
    heading: "Gitの基本概念（リポジトリ・コミット）"
    content: |
      【リポジトリ（Repository）】
        プロジェクトの「変更履歴ごと保存されたフォルダ」
        ローカルリポジトリ：自分のPC上
        リモートリポジトリ：GitHub上（クラウド）

      【コミット（Commit）】
        変更のスナップショット（セーブポイント）
        「いつ・誰が・何を・なぜ」が記録される

      ファイル変更 → ステージング → コミット
        （下書き保存）  （確定保存）

  - id: 3
    heading: "Gitのインストール（Windows）"
    content: |
      ① Git for Windows をダウンロード
        https://git-scm.com/ → Download for Windows

      ② インストール時の重要な選択
        - エディタ：「Use Visual Studio Code as Git's default editor」を選択
        - 改行コード：「Checkout Windows-style, commit Unix-style」を選択（推奨）
        - その他はデフォルトでOK

      ③ インストール確認（Git Bash または PowerShell）
        $ git --version
        git version 2.x.x と表示されればOK

  - id: 4
    heading: "初期設定（ユーザー情報の登録）"
    content: |
      Gitにコミット時の「名前」と「メールアドレス」を登録する
      ※ GitHubのアカウントと合わせること

      ターミナル（Git Bash / PowerShell）で実行：
        $ git config --global user.name "Your Name"
        $ git config --global user.email "your@email.com"

      確認：
        $ git config --list

      設定は C:\Users\ユーザー名\.gitconfig に保存される

  - id: 5
    heading: "GitHubとHTTPS接続の設定"
    content: |
      SSH鍵は使わず、HTTPSで接続する

      【認証方法：Personal Access Token (PAT)】
        GitHubのパスワードは使えなくなっている（2021年〜）
        代わりに「Personal Access Token」を使う

      PATの発行手順：
        1. GitHub → Settings → Developer settings
        2. Personal access tokens → Tokens (classic)
        3. 「Generate new token」→ スコープは「repo」にチェック
        4. 生成されたトークンをコピー（一度しか表示されない）

      初回 push 時にユーザー名とPATを入力すると
      Windows 資格情報マネージャーに保存される（次回から不要）

  - id: 6
    heading: "VSCodeとGitの連携確認"
    content: |
      VSCodeはGitと標準で連携している

      【ソース管理パネル（Ctrl + Shift + G）】
        変更ファイルの一覧表示
        ステージング・コミットがGUIで操作できる
        差分（diff）もクリック一つで確認

      【推奨拡張機能】
        GitLens：コードの各行に「誰が・いつ変更したか」を表示
          → インストール：拡張機能から「GitLens」で検索

      コマンドでもGUIでも操作できるようになることが目標

  - id: 7
    heading: "Session 1 まとめ"
    content: |
      ✅ Gitはコードの変更履歴を管理するツール
      ✅ AI駆動開発では「戻せる安心感」が開発の質を上げる
      ✅ Git for Windows をインストールし初期設定を完了
      ✅ HTTPS + PATでGitHubと接続
      ✅ VSCodeのソース管理パネルとGitLensを導入

      次回：実際にリポジトリを作り、ファイルを追加・コミットする
