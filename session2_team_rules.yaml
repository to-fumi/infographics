session: 2
title: "チーム開発のルールと品質"
audience: "初級者エンジニア（PC持ち込みあり）"
goal: "ブランチ運用ルール・コミット粒度・PRテンプレートを理解し、チームで壊れにくい開発ができるようになる"

slides:

  - id: 1
    heading: "今日やること"
    infographic: true
    content: |
      前回の復習 + チーム開発の「お作法」を学ぶ
    description: |
      【メインタイトル】 今日やること

      【レイアウト】 上部に前回の復習バッジ、中央に今日の目標チェックリスト

      【前回の復習（上部）】
        アイコン: フクロウが自信たっぷりにPRを出している
        チェックラベル: 「✅ 個人でブランチを切ってPRを出せる」

      【今日できるようになること（中央）】
        チェックリスト:
          ✅ コンフリクトを解消できる
          ✅ ブランチ運用ルールを説明できる
          ✅ 良いコミットメッセージが書ける
          ✅ PRテンプレートを作れる
          ✅ コードレビューの作法が分かる

      【右下の吹き出し】
        フクロウのセリフ: 「チーム開発のお作法を学ぼう！」

  - id: 2
    heading: "【図解④】コンフリクト発生〜解消フロー"
    infographic: true
    description: |
      【メインタイトル】 コンフリクト発生〜解消フロー

      【レイアウト】 横5ステップのフロー図。ステップ間を矢印でつなぐ

      【ステップ①】
        アイコン: フクロウAが1枚の紙（ファイルX）に書き込んで収納ボックスに入れている
        ラベル: 「AさんがXを変更&push」

      【ステップ②】
        アイコン: フクロウBが同じ紙（ファイルX）に別の内容を書き込もうとしている
        ラベル: 「BさんもXを変更&push」

      【ステップ③】
        アイコン: フクロウAとBが同じ紙を両側から引っ張り合い、紙が破れかけている
        警告ラベル: 「コンフリクト発生！🔴」

      【ステップ④】
        アイコン: 1羽のフクロウが破れた紙の前でどちらの内容を残すか考えている
        ラベル: 「手動で選択」

      【ステップ⑤】
        アイコン: フクロウがきれいな紙をボックスに入れて笑顔
        ラベル: 「解消完了・コミット」

      【コード例ボックス（下部）】
        <<<<<<< HEAD
        こんにちは！（自分の変更）
        =======
        Hello!（相手の変更）
        >>>>>>> feature/greeting

      【付箋】
        「コンフリクトは怖くない！どちらを残すか選ぶだけ」
        「VSCodeならGUIで簡単に解消できる」

  - id: 3
    heading: "【図解⑤】Git Flow vs GitHub Flow"
    infographic: true
    description: |
      【メインタイトル】 Git Flow vs GitHub Flow

      【レイアウト】 左右2カラムの比較図。中央に区切り線

      【左カラム：Git Flow】
        図解: main・develop・feature・release・hotfixの5本の線路が複雑に枝分かれしているブランチ図
        重要テキスト: 「大規模・リリース管理が厳密」

      【右カラム：GitHub Flow】
        図解: mainの1本の線路から、feature/xxxの支線が1本だけ短く出てすぐ合流するシンプルなブランチ図
        重要テキスト: 「スタートアップ・継続デプロイ向け」

      【使い分け付箋（下部）】
        「Git Flow → リリース日が決まってる / 複数バージョン並行」
        「GitHub Flow → 常時デプロイ / 小〜中規模チーム ← おすすめ！」

  - id: 4
    heading: "【図解⑥】良いコミット vs 悪いコミット"
    infographic: true
    description: |
      【メインタイトル】 良いコミット vs 悪いコミット

      【レイアウト】 左右2カラムの対比図

      【左カラム：❌ 悪いコミット】
        アイコン: ラベルのない収納ボックスが雑に積み重なった山。フクロウが困り顔
        付箋（ボックスに貼られた）:
          「修正」
          「いろいろ変えた」
          「wip」
          「あとで直す」

      【右カラム：✅ 良いコミット】
        アイコン: ラベルがきれいに貼られたボックスが棚に整然と並んでいる。フクロウが満足げに指差している
        付箋（ボックスのラベル）:
          「fix: ログイン失敗時にエラーメッセージを表示」
          「feat: ユーザー検索機能を追加」
          「chore: package.jsonの依存関係を更新」

      【中央帯：Conventional Commitsフォーマット】
        feat / fix / docs / chore / refactor

      【Tipsテキスト（下部）】
        「1コミット＝1つの目的」
        「レビュアーが5分で読めるサイズ」

  - id: 5
    heading: "PRテンプレートを作ろう"
    infographic: true
    content: |
      ハンズオン：PULL_REQUEST_TEMPLATE.md を作る
    description: |
      【メインタイトル】 PRテンプレートを作ろう

      【レイアウト】 左カラムに作成手順、右カラムにテンプレートのプレビュー

      【左カラム：作成手順】
        ステップ①:
          コマンドラベル: 「mkdir -p .github」
          コマンドラベル: 「touch .github/PULL_REQUEST_TEMPLATE.md」
        ステップ②: ラベル「内容を書く（右のテンプレートを参照）」
        ステップ③:
          コマンドラベル: 「git add → git commit -m "chore: PRテンプレートを追加" → git push」

      【右カラム：テンプレートプレビュー（ドキュメントファイルのイメージ）】
        セクション「## 変更の概要」
        セクション「## 変更理由」
        チェックボックスリスト「## テスト方法」:
          「- [ ] ローカルで動作確認した」
          「- [ ] 既存機能が壊れていないことを確認した」
        セクション「## 関連Issue」closes #

      【下部のチェックラベル】
        「次回からPRを作ると自動でテンプレートが表示される！」

  - id: 6
    heading: "レビューの作法"
    infographic: true
    content: |
      レビューはコードを育てるコミュニケーション
    description: |
      【メインタイトル】 レビューの作法

      【レイアウト】 上部に2カラム（レビュアー / レビュイー）、下部にNit文化カード

      【左カラム：レビュアー側】
        アイコン: フクロウAがコードにコメントを書いている
        チェックラベル: 「「なぜ」を聞く → 「この実装にした理由を教えてください」」
        チェックラベル: 「提案形式で書く → 「〜するとよりよいと思います」」
        チェックラベル: 「良い点も伝える → 「このアプローチ、すっきりしてていいですね」」
        警告ラベル: 「人格否定NG → 「なんでこんなコード書いたの」」

      【右カラム：レビュイー側】
        アイコン: フクロウBがPRの説明を丁寧に書いている
        チェックラベル: 「意図を先に書く → PRの説明に「なぜ」を書いておく」
        チェックラベル: 「変更は小さく → 大きいPRはレビューしにくい」
        チェックラベル: 「反論してもいい → 理由を説明して議論する」

      【下部：コメントの重み付け（Nit文化）】
        図解: 3種類のラベルカード
          「Nit: 細かい指摘（直してもどちらでもいい）」
          「Must: 必ず直してほしい」
          「Q: 質問（直さなくてもいい）」

  - id: 7
    heading: "今日のまとめ"
    infographic: true
    content: |
      チーム開発の3つの柱
    description: |
      【メインタイトル】 今日のまとめ — チーム開発の3つの柱

      【レイアウト】 3本の柱を支える建物のイメージ。各柱にサマリーカード

      【柱①：ブランチ戦略】
        アイコン: GitHub Flowのシンプルな線路図（mainから1本だけ分岐してすぐ合流）
        重要テキスト: 「小〜中規模チームは GitHub Flow が◎」
        Tipsテキスト: 「mainから切って mainに返す」

      【柱②：コミット品質】
        アイコン: ラベルがきれいに貼られたコミットボックスの棚
        重要テキスト: 「Conventional Commits で意図を伝える」
        Tipsテキスト: 「1コミット＝1目的」

      【柱③：PRの文化】
        アイコン: 2羽のフクロウがPRのコメントで対話している
        重要テキスト: 「テンプレートで説明の質をそろえる」
        Tipsテキスト: 「レビューは育てるコミュニケーション」

      【下部の予告付箋】
        「次回：仕組みで品質を自動で守る方法を学ぶ」
