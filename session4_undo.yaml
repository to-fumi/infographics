session: 4
title: "元に戻す：revert / reset"
audience: "初心者エンジニア（SPO / PowerApps 経験者）"
goal: "変更を安全に元に戻す方法を理解し、場面に応じて使い分けられるようになる"

slides:

  - id: 1
    heading: "「元に戻したい」場面はよくある"
    content: |
      AI駆動開発では特に頻発する：
        - AIが生成したコードを入れたら動かなくなった
        - コミットしたけどやっぱり不要だった
        - 間違ったファイルをステージングしてしまった

      「元に戻す」方法は状況によって使い分ける

        まだコミットしていない  → git restore
        コミット済み（安全に）  → git revert   ← 基本はこれ
        コミット済み（強制的に）→ git reset    ← 注意が必要

  - id: 2
    heading: "git restore：コミット前の変更を取り消す"
    content: |
      ファイルの変更をコミット前に取り消す

      【ステージング前の変更を取り消す】
        $ git restore ファイル名
        → 最後のコミット時点の状態に戻る
        ⚠️ 取り消しは元に戻せない。変更内容は消える

      【ステージングを取り消す（addを取り消す）】
        $ git restore --staged ファイル名
        → ステージングが外れるだけ。ファイルの変更は残る

      VSCode：ソース管理パネルでファイルを右クリック
        →「変更を破棄」または「ステージを元に戻す」

  - id: 3
    heading: "git revert：コミットを安全に打ち消す"
    content: |
      指定したコミットを「打ち消すコミット」を新たに作る

        $ git revert コミットハッシュ
        例：$ git revert a3f9c12

      特徴：
        ✅ 履歴は残る（打ち消した記録が残る）
        ✅ push済みのコミットでも安全に使える
        ✅ チーム開発でも安心
        → 基本はこれを使う

      コミットハッシュの確認：
        $ git log --oneline
        → 先頭の短い文字列（例：a3f9c12）がハッシュ

      実行するとエディタが開いてコミットメッセージの編集を求められる
      → そのまま保存して閉じればOK（VSCodeが開く）

  - id: 4
    heading: "git reset：コミット自体をなかったことにする"
    content: |
      指定したコミット以降の履歴を削除する

      【--soft：コミットだけ取り消す（変更はステージングに残る）】
        $ git reset --soft HEAD~1
        → 直前のコミットを取り消し。ファイルの変更は残る

      【--hard：コミットも変更も全部消す】
        $ git reset --hard HEAD~1
        ⚠️ ファイルの変更まで消える。元に戻せない

      使い所：
        まだ push していないローカルのコミットを整理したいとき
        push 済みのコミットに使うとチームに影響が出る → 使わない

      HEAD~1 = HEAD^ = 直前のコミット
      HEAD~2 = HEAD^^ = 2つ前のコミット

  - id: 5
    heading: "revert vs reset：どちらを使うか"
    content: |
      【シンプルな判断基準】

        push済み or チーム共有のブランチ  → revert 一択
        まだ push していないローカルのみ  → reset でも OK

      ┌─────────────────┬─────────┬──────────┐
      │                 │ revert  │  reset   │
      ├─────────────────┼─────────┼──────────┤
      │ 履歴            │ 残る    │ 消える   │
      │ push済みでも OK │ ✅      │ ⚠️       │
      │ チーム開発      │ 安全    │ 危険     │
      └─────────────────┴─────────┴──────────┘

      迷ったら revert を使う

  - id: 6
    heading: "Session 4 まとめ"
    content: |
      ✅ git restore          コミット前の変更・ステージングを取り消す
      ✅ git revert           コミットを安全に打ち消す（基本はこれ）
      ✅ git reset --soft     コミットだけ取り消す（ローカルのみ）
      ✅ git reset --hard     コミットも変更も消す（慎重に）

      【AI駆動開発との紐付け】
        AIが生成したコードをコミットして動かなくなった
        → push済みなら git revert で安全に打ち消す
        → まだローカルなら git reset --soft で整理してから再コミット

      次回：GitHub Actions + CI（コードの自動チェック）
