session: 1
title: "Git基本 + 個人でPR作成まで"
audience: "初級者エンジニア（PC持ち込みあり）"
goal: "一人でブランチを切り、コミットしてPull Requestを出してマージできるようになる"

slides:

  - id: 1
    heading: "こういうこと、ありませんか？"
    infographic: true
    description: |
      【メインタイトル】 こういうこと、ありませんか？

      【レイアウト】 2列3行のBefore/After比較グリッド。左列「❌ Before」、右列「✅ After」

      【行①：ファイル管理】
        図解（左）: フクロウが「readme_final_v2_FINAL_最終.py」などのファイルの山に埋もれて困惑している
        警告ラベル: 「どれが最新か分からない。古い版を上げてしまった」
        図解（右）: フクロウが1枚のファイルを持ち、背後にコミット履歴のタイムラインが見える
        チェックラベル: 「ファイルは1つだけ。コミットがバージョンになる」

      【行②：変更の恐怖】
        図解（左）: フクロウが崖の端で震えながら下を見ている
        警告ラベル: 「壊すのが怖くてコードを大きく書き直せない」
        図解（右）: フクロウが本線（main）とは別の作業台（ブランチ）の上で安心して作業している
        チェックラベル: 「ブランチを使えば、本体を触らずに安全に試せる」

      【行③：原因不明の不具合】
        図解（左）: フクロウが煙を出す壊れたPCの前でパニックになっている
        警告ラベル: 「どこが変わったか分からない。動かなくなった」
        図解（右）: フクロウがタイムラインの巻き戻しボタンを押し、PCが正常に戻っている
        チェックラベル: 「コミットしておけば1コマンドで元に戻せる」

      【右下の吹き出し】
        フクロウのセリフ: 「全部、Gitで解決できます。」

  - id: 2
    heading: "Gitとは何か"
    infographic: true
    content: |
      一言で言うと「コードのセーブポイント管理ツール」
    description: |
      【メインタイトル】 Gitとは何か？

      【レイアウト】 左右2カラムの対比図。中央に「＝」の等号

      【左カラム：ゲームのセーブ】
        アイコン: ゲームコントローラーとセーブポイントの旗
        図解（上）: フクロウがセーブせずにボスに挑み「GAME OVER」画面の前で泣いている
        警告ラベル: 「セーブせずに挑む → 負けたら最初からやり直し」
        図解（下）: フクロウがセーブポイントから余裕で再スタートしている
        チェックラベル: 「こまめにセーブ → 負けても直前から再開できる」

      【中央の等号ラベル】
        重要テキスト: 「ゲームの「セーブ」 ＝ Gitの「コミット」」

      【右カラム：Gitのコミット】
        アイコン: ラベルを貼った収納ボックスが棚に積み重なっているコミット履歴
        Tipsテキスト: 「コミットするたびに、その時点のコード全体が記録される」
        Tipsテキスト: 「あとから任意のコミットに戻せる」

      【下部の吹き出し】
        フクロウのセリフ: 「だからファイルは1つでいい。怖くても大きく変えられる。」

  - id: 3
    heading: "【図解①】コードをセーブするまでの流れ"
    infographic: true
    description: |
      【メインタイトル】 コードをセーブするまでの流れ

      【レイアウト】 縦4ステップのフロー図。ステップ間を太い下向き矢印でつなぐ

      【ステップ①：コードを書く】
        アイコン: フクロウがノートPCの前でコードを書いている
        Tipsテキスト: 「いつも通りファイルを編集するだけ」

      【ステップ②：git add】
        コマンドラベル: 「git add」
        アイコン: フクロウが複数の紙（ファイル）の中から1枚を選んで両手で抱えている
        Tipsテキスト: 「セーブしたい変更を選ぶ」

      【ステップ③：git commit】
        コマンドラベル: 「git commit -m "ログイン機能を追加"」
        アイコン: フクロウがラベルを貼った紙を収納ボックスに入れている
        Tipsテキスト: 「ボックスに記録する＝セーブ完了」

      【ステップ④：git log】
        コマンドラベル: 「git log」
        アイコン: フクロウがラベルの並んだ棚（コミット履歴）を眺めている
        Tipsテキスト: 「いつ・何をセーブしたか確認できる」

      【下部の吹き出し】
        フクロウのセリフ: 「これだけ覚えれば、main_最終版.pyはもう作らなくていい！」

  - id: 4
    heading: "【図解②】ブランチのタイムライン"
    infographic: true
    description: |
      【メインタイトル】 ブランチのタイムライン

      【レイアウト】 横軸タイムラインの線路分岐図

      【図解：メイン】
        タイムラインとフローチャート:
        - main（上段）: まっすぐ伸びる本線の線路。青いコミット（丸）が等間隔に並ぶ
        - 途中で線路が下に分岐し、feature/loginブランチ（下段）になる
        - feature/login: 緑のコミット（丸）が3つ並び、最後にmainへ合流する（赤い合流点）
        - 合流点のラベル: 「Pull Request」

      【凡例（右下）】
        アイコン: ● 青＝mainのコミット　● 緑＝featureのコミット　● 赤＝マージコミット

      【付箋】
        「mainは常に動く状態をキープ！」
        「作業はブランチで安全に！」

  - id: 5
    heading: "【図解③】ローカル↔リモート"
    infographic: true
    description: |
      【メインタイトル】 ローカル↔リモート

      【レイアウト】 左右2ボックスを矢印でつなぐ関係図

      【左ボックス】
        アイコン: デスクの上のノートPC＋フォルダ
        ラベル: 「自分のPC（ローカルリポジトリ）」

      【右ボックス】
        アイコン: 雲の上のサーバー建物にGitHubロゴ
        ラベル: 「GitHub（リモートリポジトリ）」

      【矢印①（左→右）】
        コマンドラベル: 「git push」
        Tipsテキスト: 「ローカルの変更をGitHubに送る」

      【矢印②（右→左）】
        コマンドラベル: 「git pull」
        Tipsテキスト: 「GitHubの最新をローカルに取り込む」

      【矢印③（右→左、初回）】
        コマンドラベル: 「git clone」
        Tipsテキスト: 「GitHubのリポジトリを初回取得」

  - id: 6
    heading: "ハンズオン①：最初のコミットを作る"
    infographic: true
    content: |
      ステップバイステップで実行しよう
    description: |
      【メインタイトル】 ハンズオン①：最初のコミットを作る

      【レイアウト】 縦6ステップのチェックリスト形式。各ステップにコマンドボックス

      【ステップ①】
        ラベル: 「リポジトリを作る」
        コマンドラベル: 「git init my-project」

      【ステップ②】
        ラベル: 「ファイルを作る」
        コマンドラベル: 「echo "# 練習リポジトリ" > README.md」

      【ステップ③】
        ラベル: 「状態を確認する」
        コマンドラベル: 「git status」
        Tipsテキスト: 「Untracked files: README.md と表示される」

      【ステップ④】
        ラベル: 「ステージングする」
        コマンドラベル: 「git add README.md」

      【ステップ⑤】
        ラベル: 「コミットする」
        コマンドラベル: 「git commit -m "first commit: READMEを追加"」

      【ステップ⑥】
        ラベル: 「履歴を確認する」
        コマンドラベル: 「git log --oneline」

      【右下の完成図】
        アイコン: フクロウがガッツポーズ
        チェックラベル: 「"first commit: READMEを追加" が表示されればOK！」

  - id: 7
    heading: "ハンズオン②：ブランチを切ってPRを出す"
    infographic: true
    content: |
      これが現場の基本フロー！
    description: |
      【メインタイトル】 ハンズオン②：ブランチを切ってPRを出す

      【レイアウト】 縦5ステップのフロー図。ターミナル操作とGitHub操作を交互に表示

      【ステップ①】
        ラベル: 「ブランチを作成して移動」
        コマンドラベル: 「git switch -c feature/add-greeting」

      【ステップ②】
        ラベル: 「ファイルを編集してコミット」
        コマンドラベル: 「git add README.md → git commit -m "feat: あいさつ文を追加"」

      【ステップ③】
        ラベル: 「GitHubにプッシュ」
        コマンドラベル: 「git push origin feature/add-greeting」

      【ステップ④】
        ラベル: 「Pull Requestを作成（GitHub上で）」
        アイコン: ブラウザ画面に「Compare & pull request」ボタン
        Tipsテキスト: 「タイトルと説明を書いてSubmit」

      【ステップ⑤】
        ラベル: 「mainにマージ」
        アイコン: 「Merge pull request」ボタン。ブランチが合流する線路図
        チェックラベル: 「これが現場の基本開発フロー！」

  - id: 8
    heading: "今日のまとめ"
    infographic: true
    content: |
      覚えること3つ
    description: |
      【メインタイトル】 今日のまとめ

      【レイアウト】 3カラムのサマリーカード

      【カラム①：コマンド】
        アイコン: フクロウがターミナルを操作している
        重要テキスト: 「git add → git commit → git push」
        Tipsテキスト: 「git switch -c ブランチ名 でブランチを作る」

      【カラム②：概念】
        アイコン: 3層の収納ボックス（Working / Staging / Repository）とブランチの分岐線路
        重要テキスト: 「ブランチ＝安全な作業スペース」
        Tipsテキスト: 「PR＝レビューしてからmainに統合する仕組み」

      【カラム③：習慣】
        アイコン: チェックリストを持ったフクロウ
        重要テキスト: 「作業前に必ず git status」
        Tipsテキスト: 「mainに直接コミットしない」

      【下部の予告付箋】
        「次回：チームで壊さず開発するルールを学ぶ」
