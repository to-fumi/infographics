session: 第2回 — チーム開発
target_audience: 第1回参加者。ローカルのgit操作とpush/pullは経験済み。

infographics:
  - id: 2-1
    title: なぜブランチを切るのか — mainを守る設計思想
    description: |
      ブランチの「操作」ではなく「なぜそうするのか」という思想から入る。

      mainブランチとは「常に動く・壊れていない状態を保つ本流」のこと。
      本番環境に出ているコード、チームが共有している最新の安定版、がここにある。
      mainに直接コミットするとどうなるか。
        - 未完成の変更が本番に入る
        - テストされていないコードが混ざる
        - 問題が起きたとき「誰の変更が原因か」の特定が難しくなる
        - 複数人が同時に作業すると互いの変更が衝突しやすくなる

      これを防ぐために「featureブランチ」で作業する。
      mainから分岐して作業し、完成したらmainに戻す（マージする）という流れ。
      分岐している間は他の人の作業と干渉しない。
      自分の作業が壊れていてもmainには影響しない。
      マージ前にレビューを挟める。

      ブランチ名の命名は「何のための作業か」が読み取れることが大切。
      よく使われる接頭辞の例を示す。
        feature/xxx  — 新機能の追加
        fix/xxx      — バグの修正
        docs/xxx     — ドキュメントの更新
        refactor/xxx — 機能を変えないコードの整理

      「ブランチを切る」という表現は業界用語であり、「ブランチを作成して移動する」という意味。
      最初は言葉に戸惑うので補足として添えておく。

  - id: 2-2
    title: Pull Requestとは何か — PRの流れとレビューの意味
    description: |
      Pull Requestは「自分の変更をmainに取り込んでください」という依頼であり、
      同時に「この変更を見てもらう場所」でもある。
      単なる手続きではなく、チームで品質を担保するためのプロセスとして位置づける。

      PRの流れを順番に示す。
      ①featureブランチで作業してコミットする。
      ②GitHubでPull Requestを作成する。タイトルと説明を書く。
      ③チームメンバーがコードを見てコメントする（レビュー）。
      ④フィードバックがあれば修正してコミットし直す。
      ⑤問題なければApprove（承認）される。
      ⑥mainへマージされる。

      PR説明文に書くべきことは「何を変えたか」ではなく「なぜ変えたか」。
      コードを読めば「何を変えたか」は分かる。
      「なぜこの実装を選んだか・どういう背景でこの変更が必要か」は説明しないと伝わらない。
      良いPRは後から見た人が「このときなぜこうしたか」を理解できる記録になる。

      レビューの文化についても言及する。
      レビューは「間違いを指摘して責める」場ではない。
      「気づかなかったバグを一緒に見つける」「より良い実装を提案し合う」プロセス。
      コメントは人ではなくコードに対して行う。
      「このコードは〜」であって「あなたは〜」ではない。

      GitHubのレビューには3種類のアクションがある。
        Approve          — 問題なし、マージしてよい
        Request changes  — 修正が必要、修正後に再レビューを依頼する
        Comment          — 必須ではないが意見や質問がある

  - id: 2-3
    title: コンフリクトは怖くない — 発生の仕組みと解消の手順
    description: |
      コンフリクトに対して「エラーが出た、どうしよう」という恐怖を持つ人が多い。
      このインフォグラフィックの目的は「コンフリクトは仕組みが分かれば対処できる」という認識転換。

      コンフリクトとは何か。
      AさんとBさんが同じファイルの同じ行を、それぞれ別の内容に変更してマージしようとしたときに起きる。
      Gitは「どちらが正しいか」を自動で判断できないので、人間に判断を委ねる。
      これはGitの失敗ではなく、Gitが正直に「ここは人間が決めてください」と教えてくれている状態。

      コンフリクトが起きるとファイルの中にマーカーが挿入される。
        <<<<<<< HEAD
        Aさんの変更内容
        =======
        Bさんの変更内容
        >>>>>>> feature/xxx
      HEADが「今いるブランチの変更」、feature/xxxが「取り込もうとしている変更」。

      解消の手順は3ステップ。
      ①マーカーが入ったファイルを開いて、どちらを採用するか（あるいは両方を合わせるか）を人間が編集する。
      ②マーカー行（<<<<<<<、=======、>>>>>>>の行）を全て削除する。
      ③git add して git commit する。

      コンフリクトが起きやすい状況を事前に知っておくと怖くなくなる。
        - 同じファイルを複数人が同時に長期間編集しているとき
        - mainを長期間pullせずにfeatureブランチで作業し続けているとき
      予防策：こまめにmainをpullしてfeatureブランチに取り込む（rebaseまたはmerge）習慣をつける。
