session: 第1回 — ひとりで使うGit + Remote
target_audience: PowerApps・PowerAutomate・Python・JSON経験者。バージョン管理ツールは未経験。

infographics:
  - id: 1-1
    title: ファイル管理の地獄と、Gitが解決すること
    description: |
      まず「Gitがない世界」のリアルを見せることから始める。
      具体的なファイル名の羅列が一番刺さる。
        企画書_最終版.docx
        企画書_最終版2.docx
        企画書_最終版_田中修正.docx
        企画書_本当に最終.docx
        企画書_本当に最終_確認済.docx
      この状態で起きる問題は3つある。
      ①どれが最新か分からない。
      ②誰がいつ何を変えたか分からない。
      ③誰かが上書きすると変更が消える。
      PowerAppsを使っている受講者には「スクリプトやフローをコピーして別名保存した経験」、
      Pythonを使っている受講者には「script_v1.py / script_v2_modified.py / script_final.py」
      という経験として読み替えてもらう。
      次に「Gitがある世界」への転換を示す。
      ファイルは1つだけ存在し、変更のたびに「誰が・いつ・何を・なぜ変えたか」が全て記録されている。
      過去の状態に戻せる、変更の意図が残る、誰かの変更が消えない。
      この対比で「Gitは履歴を管理するツール」という直感を最初に作る。

  - id: 1-2
    title: Gitを理解する3つの柱 — リポジトリ・コミット・ブランチ
    description: |
      3つの概念をバラバラに説明するのではなく、「入れ子構造」として一枚に収める。

      最も外側の枠がリポジトリ。
      リポジトリとは「プロジェクト全体を入れる箱・倉庫」のこと。
      フォルダに見えるが、ただのフォルダではなく「変更の全履歴が入った特別なフォルダ」。
      .git というフォルダが自動的に作られて、そこに全ての記録が入っている。

      その中にブランチがある。
      ブランチとは「作業の流れを表す線」。
      最初は main（または master）という1本の線だけがある。
      この線の上にコミットが並んでいく。

      コミットとは「変更内容の記録1件」のこと。
      セーブポイント、スナップショット、通過点と言い換えてもよい。
      コミットには「いつ・誰が・何を変えたか・なぜ変えたか」が記録される。
      時系列に並ぶ丸い点として表現するとわかりやすい。

      3つの関係をまとめると「リポジトリの中にブランチがあり、ブランチにはコミットが並んでいる」。
      この構造を最初に示しておくと、後のハンズオンでの操作の意味が理解しやすくなる。
      この段階では深追いせず、あくまで「全体像の地図を渡す」ことが目的。

  - id: 1-3
    title: なぜ add が必要なのか — 3つの場所を理解する
    description: |
      初心者が最初につまずく「git add してから git commit する」という2ステップの意味を説明する。
      Gitには「3つの場所」があることを伝えるのが核心。

      1つ目は作業ディレクトリ（Working Directory）。
      ファイルを実際に編集している場所。変更してもGitにはまだ何も伝わっていない状態。

      2つ目はステージングエリア（Index）。
      「次のコミットに含める変更」を選んで仮置きする場所。
      git add をすると変更がここに移動する。
      「コミットしたいものだけを選ぶ」作業がここで行われる。

      3つ目がリポジトリ（履歴）。
      git commit をするとステージングエリアの内容が正式な履歴として記録される。

      なぜステージングエリアがあるのか。
      一度に複数のファイルを変更していても「関係ある変更だけをまとめてコミットする」ことができるから。
      「バグ修正と機能追加を同じコミットに混ぜない」という習慣の理由がここにある。
      後から履歴を見たとき、1コミット＝1つの意味ある変更になっていると格段に読みやすくなる。

      カメラの撮影に例えると伝わりやすい。
      作業ディレクトリ＝散らかった部屋、ステージングエリア＝写真に撮りたいものだけ並べた状態、
      コミット＝シャッターを切って記録確定。

  - id: 1-4
    title: あなたのPC と GitHub — ローカルとリモートの関係
    description: |
      「ローカル」と「リモート」という2つの世界があることを伝える。

      ローカル（自分のPC）はオフラインでも操作できる自分の作業場所。
      リモート（GitHub）はインターネット上にある共有の保管場所。
      2つの場所に「同じリポジトリ」が存在していて、コマンドで同期する。

      3つの操作の方向と意味を整理する。

      clone：リモートからローカルへ「最初の1回だけ」まるごとコピーを作る操作。
      新しいPCで作業を始めるときや、他人のリポジトリを手元に持ってくるときに使う。

      push：ローカルの変更をリモートへ「送る」操作。
      自分が加えたコミットをGitHubに反映させる。「アップロード」に近い感覚。

      pull：リモートの変更をローカルへ「受け取る」操作。
      他の人がpushした変更を自分のPCに取り込む。「ダウンロード」に近い感覚。

      PowerAutomateを知っている受講者には
      「SharePointとローカルの同期に似ているが、自動ではなく自分でタイミングを制御する」
      という説明が刺さる。

      重要なのは「自動では同期されない」という点。
      push/pullは意図的に行う操作であり、それによって「いつ共有するか」を自分で制御できる。
