session: 第3回 — GitHub高度機能
target_audience: 第1・2回参加者。PR・ブランチ運用は経験済み。

infographics:
  - id: 3-1
    title: GitHub Actionsとは — コードが変わるたびに自動で動く仕組み
    description: |
      GitHub Actionsは「GitHubに組み込まれた自動化ツール」。
      PowerAutomateを知っている受講者には「GitHubのPowerAutomate」と説明するのが最速。
      トリガーが発火したらジョブが動く、という構造がそのまま対応する。

      基本構造を3層で示す。
      ①トリガー（いつ動くか）
        mainへのpush、Pull Requestの作成・更新、毎日決まった時刻、手動実行 など。
      ②ジョブ（何をするか・処理の固まり）
        テストを実行する、コードをビルドする、スキャンをかける など。
        複数のジョブを直列・並列で実行できる。
      ③ステップ（ジョブの中の個々の手順）
        コマンドを実行する、既製のActionを呼び出す など。

      何ができるかの例を具体的に示す。
        - PRが作成されるたびにテストを自動実行して結果をPRに表示する
        - mainにマージされたら自動でデプロイする
        - コードにセキュリティの脆弱性がないかスキャンする
        - ドキュメントを自動生成する

      Actionsの設定はYAMLファイルで書く（.github/workflows/ 以下に置く）。
      JSON・YAMLを知っている受講者には「書き方の雰囲気はすぐ分かる」と伝えて安心させる。

      Actionsの本質は「人間が毎回手動でやっていたチェックを仕組みに任せる」こと。
      人間は判断が必要なことに集中し、繰り返し作業は自動化する。
      これがCI（継続的インテグレーション）という考え方の核心。

  - id: 3-2
    title: 仕組みで品質を守る3層構造 — CodeQL・Copilot Review・Ruleset
    description: |
      3つの機能を「何から守るか」で整理すると理解しやすい。
      個人の意識や注意力に頼るのではなく、仕組みが自動でチェックする、というのが共通のテーマ。

      1層目：CodeQL — セキュリティの脆弱性を自動で検出する
      GitHub Advanced Securityに含まれる静的解析ツール。
      コードをスキャンして、SQLインジェクション・XSS・バッファオーバーフローなど
      セキュリティ上の問題になりうるパターンを自動で検出する。
      PRを作成したときやmainにpushしたときに自動で実行され、問題があればPRにコメントが付く。
      設定はリポジトリのSettings → Security → Code scanningからボタン一つで有効化できる。
      「セキュリティの専門家でなくても最低限のスキャンが自動でかかる」状態を作れる。

      2層目：GitHub Copilot PR Review — AIがコードレビューを支援する
      Pull Requestを作成すると、Copilotが自動でコードを読んでレビューコメントを付ける。
      バグの可能性、パフォーマンスの問題、より良い書き方の提案 などを指摘する。
      人間のレビュアーが見落としがちな細かい問題を拾ってくれる。
      人間のレビューを置き換えるのではなく「補助」として使うのが正しい位置づけ。
      Copilotのコメントも取捨選択して使う姿勢が大切。

      3層目：Ruleset — ブランチ運用のルールを強制する
      「mainに直接pushできない」「PRなしでマージできない」「レビュー承認が必要」
      といったルールをGitHubのSettings上で設定し、機械的に強制する仕組み。
      ルールが意識・マナーではなくシステム上の制約になるため、うっかりミスが防げる。
      「チームで決めたルールが守られない」問題をツールで解決するアプローチ。

      3層まとめ：
        CodeQL      → セキュリティの問題を検出（コードの中身）
        Copilot Review → コード品質・ロジックの問題を検出（コードの中身）
        Ruleset     → ブランチ運用ルールを強制（プロセス）
      この3つが揃うと「コードが変わるたびに複数の視点で自動チェックされる」状態になる。
      個人のスキルや注意力に頼らず、仕組みで品質を担保するという設計思想を最後に伝える。
